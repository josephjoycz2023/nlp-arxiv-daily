profile:
  short: >
    关注面向真实产品落地的大模型应用研究，重点包括 Agent 系统、RAG/Memory、
    长期记忆、个性化、SFT/RL/OPD 数据构造、LLM Judge、自动评测、
    AI 伴侣与 POI 场景。优先关注可复现、实验充分、能转化为数据、
    模型、评测或系统设计的工作；排除纯理论、早期概念验证、
    与真实应用距离较远的优化论文。

  full: >
    当前研究目标不是追踪所有 LLM/NLP 论文，而是筛选能够支持真实产品落地的研究。
    重点关注：
    1. Agent 系统在长期任务、用户交互、工具调用、规划、记忆中的落地方法；
    2. RAG、长期记忆、用户偏好、角色记忆、个性化建模；
    3. SFT/RL/OPD、数据生产、数据评估、LLM Judge、自动化评测；
    4. AI 陪伴、角色人格、POI、生活/旅行推荐、情境记忆等应用；
    5. 能够启发工程 pipeline、数据 schema、评测指标、模型训练或产品功能的工作。
    不优先关注：
    1. 纯数学/理论推导；
    2. 只在小型 benchmark 上验证、没有明确落地路径的优化；
    3. 与当前场景只有关键词相关但任务目标无关的论文；
    4. 过度依赖尚不成熟硬件、私有数据或不可复现系统的工作。

tracks:
  - id: agent_system
    name: Agent 系统与工具调用
    include:
      - LLM Agent
      - multi-agent
      - tool use
      - planning
      - workflow
      - environment interaction
    exclude:
      - robotics-only
      - game-only benchmark
      - pure planning theory

  - id: memory_personalization
    name: 记忆与个性化
    include:
      - long-term memory
      - user preference
      - personalization
      - character memory
      - episodic memory
      - RAG memory
    exclude:
      - biological memory
      - neuroscience-only

  - id: data_eval_judge
    name: 数据、评测与 Judge
    include:
      - LLM-as-a-judge
      - evaluation
      - SFT data
      - RL data
      - preference data
      - synthetic data
      - data quality
    exclude:
      - benchmark leaderboard only
      - no method contribution

  - id: applied_companion_poi
    name: AI 伴侣与 POI 落地场景
    include:
      - conversational agent
      - companion
      - recommendation
      - POI
      - travel recommendation
      - user modeling
    exclude:
      - generic recommender without LLM
      - e-commerce only

level1:
  max_prompt_profile_chars: 350
  decision_thresholds:
    reject_below_relevance: 1
    archive_below_total: 6
    level2_min_total: 8
  max_level2_candidates_per_day: 8

level2:
  max_papers_per_day: 5
  skip_sections:
    - introduction
    - related work
  prefer_sections:
    - abstract
    - method
    - approach
    - experiments
    - results
    - discussion
    - limitation
    - conclusion

output:
  language: Chinese
  digest_max_papers: 5
  include_archive_summary: true
