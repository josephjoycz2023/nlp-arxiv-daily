name: check-lint

on: [pull_request]

jobs:
  check-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check lock file
        run: make check-lock

      - name: Check Lint
        run: make quality
