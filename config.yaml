user_name: "josephjoycz2023"
repo_name: "nlp-arxiv-daily"
show_authors: True
show_links: True
show_badge: False
max_results: 10

publish_readme: False
publish_gitpage: True
enable_hf_papers: False

openai_api_key: ""
openai_model: "gpt-5-mini"
openai_base_url: "https://api.openai.com/v1"
openai_timeout: 60
openai_instructions: ""

# publish_gitpage uses the directory containing `json_gitpage_path`
# as the docs root, and writes per-paper files under
# docs/<topic>/<YYYYMMDD>/<paper_id>.json.
json_gitpage_path: "./docs/nlp-arxiv-daily-web.json"
md_gitpage_path: "./docs/index.md"
archive_gitpage_json_dir: "./docs/archive-web"
archive_gitpage_md_dir: "./docs/archive-web"

# keywords to search
keywords:
  "agent":
    filters:
      [
        "LLM Agent",
        "Language Agent",
        "Autonomous Agent",
        "AI Agent",
        "Agentic",
        "Multi-Agent",
        "Multi Agent System",
        "Multi-Agent System",
      ]
